#
# CI for the public GoHaSeMo Core SDK repo.
#
# This is a Go module — Bun/Node are NOT used here.
# Per G-ADR-24, all actions are SHA-pinned (full 40-char commit SHA, never a
# tag or branch; the trailing comment names the pinned version).

name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CGO_ENABLED: "0"

jobs:
  build-test:
    name: build / test / lint / vuln
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # NOTE: The Go race detector REQUIRES cgo (CGO_ENABLED=1) on every
      # platform. This step is the single sanctioned exception to the no-CGO
      # invariant: it is test-only instrumentation and builds NO shippable
      # artifact. All production builds remain CGO_ENABLED=0.
      - name: Test (race; test-only cgo exception)
        run: CGO_ENABLED=1 go test -race -count=1 -timeout=10m ./...

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Verify stdlib-only (no require block)
        # The SDK must stay dependency-free (ADR-008 import isolation).
        # Fail if `go mod tidy` would introduce a require block.
        run: |
          go mod tidy
          if grep -q '^require' go.mod; then
            echo "::error::go.mod gained a require block — SDK must be stdlib-only"
            exit 1
          fi
          git diff --exit-code go.mod go.sum
